# Kubernetes部署配置文件 - 数字显示网站
# 包含Deployment和Service配置

---
# Deployment配置 - 负责管理Pod副本
apiVersion: apps/v1
kind: Deployment
metadata:
  name: numbers-website
  labels:
    app: numbers-website
spec:
  # 副本数量 - 可以根据需要调整
  replicas: 2
  selector:
    matchLabels:
      app: numbers-website
  template:
    metadata:
      labels:
        app: numbers-website
    spec:
      containers:
      - name: nginx-server
        # 这里需要替换为您构建的镜像地址
        image: your-registry/numbers-website:latest
        ports:
        - containerPort: 80
          protocol: TCP
        # 资源限制 - 防止资源过度使用
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
        # 健康检查配置
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      # 重启策略
      restartPolicy: Always

---
# Service配置 - 负责对外暴露服务
apiVersion: v1
kind: Service
metadata:
  name: numbers-website-service
  labels:
    app: numbers-website
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: numbers-website

---
# Ingress配置 - 负责外部访问路由（可选）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: numbers-website-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # 如果需要HTTPS，取消下面的注释
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # 如果需要HTTPS，取消下面的注释
  # tls:
  # - hosts:
  #   - your-domain.com
  #   secretName: numbers-website-tls
  rules:
  - host: your-domain.com  # 替换为您的域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: numbers-website-service
            port:
              number: 80 