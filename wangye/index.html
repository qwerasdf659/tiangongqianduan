<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 页面元数据配置 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显示数字1、2、3</title>
    
    <!-- 页面样式设置 -->
    <style>
        /* 重置默认样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 页面主体样式 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* 数字容器样式 */
        .numbers-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
        }
        
        /* 数字显示样式 */
        .number {
            font-size: 72px;
            font-weight: bold;
            color: #333333;
            margin: 0 20px;
            display: inline-block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        /* 标题样式 */
        .title {
            font-size: 24px;
            color: #666666;
            margin-bottom: 30px;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <!-- 页面主要内容区域 -->
    <div class="numbers-container">
        <!-- 页面标题 -->
        <h1 class="title">数字显示</h1>
        
        <!-- 数字显示区域 -->
        <div class="numbers-display">
            <!-- 显示数字1 -->
            <span class="number">1</span>
            <!-- 显示数字2 -->
            <span class="number">2</span>
            <!-- 显示数字3 -->
            <span class="number">3</span>
        </div>
    </div>
</body>
</html>
